// ── IndexedDB ─────────────────────────────────────────────────────────────────
// Data is stored in the BROWSER (IndexedDB), NOT inside the HTML file.
// Replacing/updating index.html will NOT erase your trades.
const DB_NAME="trader-journal-db";const DB_VER=1;const STORE_NAME="trades";
function openDB(){
  return new Promise((res,rej)=>{
    const req=indexedDB.open(DB_NAME,DB_VER);
    req.onupgradeneeded=e=>{
      const db=e.target.result;
      if(!db.objectStoreNames.contains(STORE_NAME)){
        const st=db.createObjectStore(STORE_NAME,{keyPath:"id"});
        st.createIndex("date","date",{unique:false});
      }
    };
    req.onsuccess=e=>res(e.target.result);
    req.onerror=e=>rej(e.target.error);
  });
}
async function dbGetAll(){
  const db=await openDB();
  return new Promise((res,rej)=>{
    const req=db.transaction(STORE_NAME,"readonly").objectStore(STORE_NAME).getAll();
    req.onsuccess=e=>res(e.target.result.sort((a,b)=>new Date(b.date)-new Date(a.date)));
    req.onerror=e=>rej(e.target.error);
  });
}
async function dbPut(trade){
  const db=await openDB();
  return new Promise((res,rej)=>{
    const tx=db.transaction(STORE_NAME,"readwrite");
    tx.objectStore(STORE_NAME).put(trade);
    tx.oncomplete=res;tx.onerror=e=>rej(e.target.error);
  });
}
async function dbDelete(id){
  const db=await openDB();
  return new Promise((res,rej)=>{
    const tx=db.transaction(STORE_NAME,"readwrite");
    tx.objectStore(STORE_NAME).delete(id);
    tx.oncomplete=res;tx.onerror=e=>rej(e.target.error);
  });
}
async function dbClear(){
  const db=await openDB();
  return new Promise((res,rej)=>{
    const tx=db.transaction(STORE_NAME,"readwrite");
    tx.objectStore(STORE_NAME).clear();
    tx.oncomplete=res;tx.onerror=e=>rej(e.target.error);
  });
}
async function dbImport(incoming,mode){
  const db=await openDB();
  const tx=db.transaction(STORE_NAME,"readwrite");
  const st=tx.objectStore(STORE_NAME);
  if(mode==="replace") st.clear();
  incoming.forEach(tr=>st.put(tr));
  return new Promise((res,rej)=>{tx.oncomplete=res;tx.onerror=e=>rej(e.target.error);});
}

// Migrate from old localStorage if present
async function migrateFromLS(){
  try{
    const old=localStorage.getItem("tj_trades_v3");
    if(!old)return;
    const trades=JSON.parse(old);
    if(!trades||!trades.length)return;
    const existing=await dbGetAll();
    if(existing.length>0)return; // already migrated
    const db=await openDB();
    const tx=db.transaction(STORE_NAME,"readwrite");
    const st=tx.objectStore(STORE_NAME);
    trades.forEach(tr=>st.put(tr));
    await new Promise((res,rej)=>{tx.oncomplete=res;tx.onerror=rej;});
    localStorage.removeItem("tj_trades_v3");
  }catch(e){console.warn("Migration error:",e);}
}

function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7);}

// ── Supabase Layer ────────────────────────────────────────────────────────────
// Keys stored in localStorage — never hardcoded in source
const SB_URL_KEY="tj_sb_url";
const SB_KEY_KEY="tj_sb_key";
const SB_SESSION_KEY="tj_sb_session";

function getSBConfig(){
  return{
    url:localStorage.getItem(SB_URL_KEY)||"",
    key:localStorage.getItem(SB_KEY_KEY)||"",
  };
}
function hasSBConfig(){const c=getSBConfig();return !!(c.url&&c.key);}

// Low-level fetch wrapper for Supabase REST API
async function sbFetch(path,options={}){
  const {url,key}=getSBConfig();
  if(!url||!key)throw new Error("No Supabase config");
  const session=JSON.parse(localStorage.getItem(SB_SESSION_KEY)||"null");
  const headers={
    "Content-Type":"application/json",
    "apikey":key,
    "Authorization":`Bearer ${session?.access_token||key}`,
    ...options.headers,
  };
  const res=await fetch(`${url}${path}`,{...options,headers});
  if(!res.ok){const err=await res.text();throw new Error(err);}
  const text=await res.text();
  return text?JSON.parse(text):null;
}

// Auth
async function sbSignUp(email,password){
  const {url,key}=getSBConfig();
  const res=await fetch(`${url}/auth/v1/signup`,{
    method:"POST",headers:{"Content-Type":"application/json","apikey":key},
    body:JSON.stringify({email,password}),
  });
  const data=await res.json();
  if(data.error)throw new Error(data.error.message||data.error);
  if(data.session)localStorage.setItem(SB_SESSION_KEY,JSON.stringify(data.session));
  return data;
}
async function sbSignIn(email,password){
  const {url,key}=getSBConfig();
  const res=await fetch(`${url}/auth/v1/token?grant_type=password`,{
    method:"POST",headers:{"Content-Type":"application/json","apikey":key},
    body:JSON.stringify({email,password}),
  });
  const data=await res.json();
  if(data.error_description||data.error)throw new Error(data.error_description||data.error);
  localStorage.setItem(SB_SESSION_KEY,JSON.stringify(data));
  return data;
}
async function sbSignOut(){
  try{
    await sbFetch("/auth/v1/logout",{method:"POST"});
  }catch(e){}
  localStorage.removeItem(SB_SESSION_KEY);
}
async function sbRefreshSession(){
  try{
    const session=JSON.parse(localStorage.getItem(SB_SESSION_KEY)||"null");
    if(!session?.refresh_token)return null;
    const {url,key}=getSBConfig();
    const res=await fetch(`${url}/auth/v1/token?grant_type=refresh_token`,{
      method:"POST",headers:{"Content-Type":"application/json","apikey":key},
      body:JSON.stringify({refresh_token:session.refresh_token}),
    });
    const data=await res.json();
    if(data.access_token){localStorage.setItem(SB_SESSION_KEY,JSON.stringify(data));return data;}
    return null;
  }catch{return null;}
}
function sbGetUser(){
  const s=JSON.parse(localStorage.getItem(SB_SESSION_KEY)||"null");
  return s?.user||null;
}

// Trades CRUD via Supabase REST
async function sbGetAll(){
  const data=await sbFetch("/rest/v1/trades?select=id,data,updated_at&order=updated_at.desc");
  return (data||[]).map(r=>({...r.data,id:r.id}));
}
async function sbUpsert(trade){
  const user=sbGetUser();
  if(!user)throw new Error("Not authenticated");
  await sbFetch("/rest/v1/trades",{
    method:"POST",
    headers:{"Prefer":"resolution=merge-duplicates"},
    body:JSON.stringify({id:trade.id,user_id:user.id,data:trade,updated_at:new Date().toISOString()}),
  });
}
async function sbDelete(id){
  await sbFetch(`/rest/v1/trades?id=eq.${id}`,{method:"DELETE"});
}
async function sbClear(){
  await sbFetch("/rest/v1/trades",{method:"DELETE",headers:{"Prefer":"return=minimal"}});
}
async function sbUpsertMany(trades){
  const user=sbGetUser();
  if(!user)throw new Error("Not authenticated");
  const rows=trades.map(t=>({id:t.id,user_id:user.id,data:t,updated_at:new Date().toISOString()}));
  await sbFetch("/rest/v1/trades",{
    method:"POST",
    headers:{"Prefer":"resolution=merge-duplicates"},
    body:JSON.stringify(rows),
  });
}

const AuthCtx=createContext(null);
const useAuth=()=>useContext(AuthCtx);
function AuthProvider({children}){
  const [user,setUser]=useState(()=>sbGetUser());
  const [sbReady,setSbReady]=useState(false); // supabase configured + user logged in
  const [sbConfigured,setSbConfigured]=useState(hasSBConfig);

  useEffect(()=>{
    if(!hasSBConfig()){setSbReady(false);return;}
    // Try refresh session on load
    sbRefreshSession().then(s=>{
      const u=sbGetUser();
      setUser(u);setSbReady(!!u);
    });
  },[]);

  const login=async(email,password)=>{
    await sbSignIn(email,password);
    const u=sbGetUser();setUser(u);setSbReady(!!u);
  };
  const register=async(email,password)=>{
    await sbSignUp(email,password);
    // auto sign in after register
    await sbSignIn(email,password);
    const u=sbGetUser();setUser(u);setSbReady(!!u);
  };
  const logout=async()=>{
    await sbSignOut();setUser(null);setSbReady(false);
  };
  const saveSBConfig=(url,key)=>{
    localStorage.setItem(SB_URL_KEY,url.trim());
    localStorage.setItem(SB_KEY_KEY,key.trim());
    setSbConfigured(!!(url.trim()&&key.trim()));
  };
  const removeSBConfig=()=>{
    localStorage.removeItem(SB_URL_KEY);localStorage.removeItem(SB_KEY_KEY);
    localStorage.removeItem(SB_SESSION_KEY);
    setUser(null);setSbReady(false);setSbConfigured(false);
  };

  return <AuthCtx.Provider value={{user,sbReady,sbConfigured,login,register,logout,saveSBConfig,removeSBConfig,setUser,setSbReady,setSbConfigured}}>
    {children}
  </AuthCtx.Provider>;
}

// ── Trades Context (with cloud sync) ─────────────────────────────────────────
const TradesCtx=createContext(null);
const useTrades=()=>useContext(TradesCtx);
function computeStats(trades){
  const cl=trades.filter(t=>t.status==="closed"&&t.resultR!=null);
  const wins=cl.filter(t=>t.resultR>0),losses=cl.filter(t=>t.resultR<0);
  const tR=cl.reduce((s,t)=>s+t.resultR,0);
  const tW=wins.reduce((s,t)=>s+t.resultR,0);
  const tL=Math.abs(losses.reduce((s,t)=>s+t.resultR,0));
  const tU=cl.reduce((s,t)=>s+(t.resultUSD??0),0);
  const cls={"A+":0,A:0,B:0,C:0,D:0};
  cl.forEach(t=>{if(t.tradeClass)cls[t.tradeClass]++;});
  return{total:cl.length,wins:wins.length,losses:losses.length,
    winRate:cl.length?(wins.length/cl.length)*100:0,
    totalR:tR,totalUSD:tU,
    avgWin:wins.length?tW/wins.length:0,avgLoss:losses.length?tL/losses.length:0,
    pf:tL>0?tW/tL:tW>0?Infinity:0,
    best:cl.length?Math.max(...cl.map(t=>t.resultR)):0,
    worst:cl.length?Math.min(...cl.map(t=>t.resultR)):0,
    open:trades.filter(t=>t.status==="open").length,
    plans:trades.filter(t=>t.status==="plan").length,
    cls};
}
function TradesProvider({children}){
  const {sbReady}=useAuth();
  const [trades,setTrades]=useState([]);
  const [loaded,setLoaded]=useState(false);
  const [syncing,setSyncing]=useState(false);

  // Load trades — from Supabase if logged in, else IndexedDB
  useEffect(()=>{
    setLoaded(false);
    const load=async()=>{
      await migrateFromLS();
      if(sbReady){
        try{
          const cloudTrades=await sbGetAll();
          // Merge with local (cloud wins on conflicts)
          const local=await dbGetAll();
          const cloudIds=new Set(cloudTrades.map(t=>t.id));
          const localOnly=local.filter(t=>!cloudIds.has(t.id));
          // Push local-only trades to cloud
          if(localOnly.length>0){await sbUpsertMany(localOnly).catch(()=>{});}
          const merged=[...cloudTrades,...localOnly].sort((a,b)=>new Date(b.date)-new Date(a.date));
          // Update local cache
          for(const t of merged) await dbPut(t);
          setTrades(merged);
        }catch(e){
          // Cloud failed — fallback to local
          console.warn("Cloud load failed, using local:",e);
          const local=await dbGetAll();
          setTrades(local);
        }
      }else{
        const local=await dbGetAll();
        setTrades(local);
      }
      setLoaded(true);
    };
    load();
  },[sbReady]);

  const stats=useMemo(()=>computeStats(trades),[trades]);

  const addTrade=useCallback(async d=>{
    const trade={...d,id:uid(),date:d.date||new Date().toISOString()};
    await dbPut(trade);
    if(sbReady){sbUpsert(trade).catch(e=>console.warn("Cloud sync error:",e));}
    setTrades(p=>[trade,...p]);
  },[sbReady]);

  const updateTrade=useCallback(async(id,u)=>{
    setTrades(p=>{
      const next=p.map(t=>t.id===id?{...t,...u}:t);
      const tr=next.find(t=>t.id===id);
      if(tr){
        dbPut(tr);
        if(sbReady)sbUpsert(tr).catch(e=>console.warn("Cloud sync error:",e));
      }
      return next;
    });
  },[sbReady]);

  const deleteTrade=useCallback(async id=>{
    await dbDelete(id);
    if(sbReady){sbDelete(id).catch(e=>console.warn("Cloud delete error:",e));}
    setTrades(p=>p.filter(t=>t.id!==id));
  },[sbReady]);

  // Manual sync all local → cloud
  const syncToCloud=useCallback(async()=>{
    if(!sbReady)return;
    setSyncing(true);
    try{
      const local=await dbGetAll();
      await sbUpsertMany(local);
      return local.length;
    }finally{setSyncing(false);}
  },[sbReady]);

  // Clear — both local and cloud
  const clearAll=useCallback(async()=>{
    await dbClear();
    if(sbReady){await sbClear().catch(()=>{});}
    setTrades([]);
  },[sbReady]);

  if(!loaded)return(
    <div style={{height:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:C.bg,flexDirection:"column",gap:12}}>
      <div style={{width:32,height:32,borderRadius:16,border:`2px solid ${C.tint}`,borderTopColor:"transparent",animation:"spin 0.8s linear infinite"}}/>
      <style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style>
      <div style={{fontSize:12,color:C.text3,fontFamily:"'JetBrains Mono',monospace"}}>{sbReady?"Загрузка из облака...":"Загрузка..."}</div>
    </div>
  );

  return <TradesCtx.Provider value={{trades,stats,addTrade,updateTrade,deleteTrade,syncToCloud,syncing,clearAll}}>{children}</TradesCtx.Provider>;
}

// ── Term Tooltip ──────────────────────────────────────────────────────────────
function Term({word,children}){
  const {t}=useLang();
  const [show,setShow]=useState(false);
  const [pos,setPos]=useState({x:0,y:0});
  const ref=useRef();
  const def=t.glossary?.[word];
  if(!def) return <span>{children||word}</span>;

  function handleEnter(e){
    const rect=ref.current?.getBoundingClientRect();
    if(!rect)return;
    const tipW=260;
    let x=rect.left;
    if(x+tipW>window.innerWidth-8) x=window.innerWidth-tipW-8;
    if(x<8) x=8;
    const y=rect.bottom+6;
    setPos({x,y});setShow(true);
  }

  return(
    <>
      <span ref={ref}
        onMouseEnter={handleEnter} onMouseLeave={()=>setShow(false)}
        onTouchStart={handleEnter} onTouchEnd={()=>setTimeout(()=>setShow(false),2000)}
        style={{borderBottom:`1px dashed ${C.tint}80`,cursor:"help",color:"inherit"}}>
        {children||word}
      </span>
      {show&&typeof document!=="undefined"&&ReactDOM.createPortal(
        <div style={{
          position:"fixed",left:pos.x,top:pos.y,zIndex:9999,
          width:260,background:C.bg2,border:`1px solid ${C.tint}50`,
          borderRadius:12,padding:"10px 14px",
          boxShadow:`0 8px 32px #00000080, 0 0 0 1px ${C.tint}20`,
          pointerEvents:"none",
        }}>
          <div style={{fontSize:12,fontWeight:700,color:C.tint,fontFamily:"'JetBrains Mono',monospace",marginBottom:5}}>{word}</div>
          <div style={{fontSize:12,color:C.text2,lineHeight:1.6}}>{def}</div>
        </div>,
        document.body
      )}
    </>
  );
}

// ── Equity Chart ──────────────────────────────────────────────────────────────
function EquityChart({trades}){
  const pts2=useMemo(()=>{const arr=trades.filter(t=>t.status==="closed"&&t.resultR!=null).slice().reverse();let c=0;return arr.map(t=>{c+=t.resultR;return c;});},[trades]);
  if(pts2.length<2)return null;
  const mn=Math.min(...pts2,0),mx=Math.max(...pts2,0),rng=mx-mn||1;
  const W=400,H=80,p=4;
  const pts=pts2.map((v,i)=>`${p+(i/(pts2.length-1))*(W-p*2)},${p+(1-(v-mn)/rng)*(H-p*2)}`).join(" ");
  const col=pts2[pts2.length-1]>=0?C.profit:C.loss;
  return(<div style={{overflow:"hidden",borderRadius:8}}><svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",height:70}} preserveAspectRatio="none"><defs><linearGradient id="eg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={col} stopOpacity="0.25"/><stop offset="100%" stopColor={col} stopOpacity="0"/></linearGradient></defs>{mn<0&&mx>0&&<line x1={p} x2={W-p} y1={p+(1-(0-mn)/rng)*(H-p*2)} y2={p+(1-(0-mn)/rng)*(H-p*2)} stroke={C.border} strokeWidth={1} strokeDasharray="3 3"/>}<polyline points={pts} fill="none" stroke={col} strokeWidth={2} strokeLinecap="round" strokeLinejoin="round"/><polygon points={`${p},${H} ${pts} ${W-p},${H}`} fill="url(#eg)"/></svg></div>);
}

const POPULAR=["GBPUSD","EURUSD","USDCHF","USDJPY","NZDUSD","USDCAD","AUDUSD","XAUUSD","XAGUSD","BCOUSD","BTCUSDT"];
function detectInstr(sym){
  const s=sym.toUpperCase();
  if(s.includes("JPY"))return{pip:0.01,label:"Forex JPY",cs:100000};
  if(["BTC","ETH","XRP","SOL","BNB"].some(c=>s.includes(c)))return{pip:1,label:"Crypto",cs:1};
  if(["NAS","SP5","US3","DAX","FTSE","DOW"].some(c=>s.includes(c)))return{pip:0.1,label:"Index",cs:10};
  if(s.includes("XAU")||s.includes("GOLD"))return{pip:0.01,label:"Gold",cs:100};
  if(s.includes("XAG"))return{pip:0.001,label:"Silver",cs:5000};
  if(s.includes("BCO")||s.includes("OIL")||s.includes("WTI"))return{pip:0.01,label:"Oil",cs:100};
  return{pip:0.0001,label:"Forex",cs:100000};
}
function Calculator({onOpenInJournal,isDesktop}){
  const {t}=useLang();
  const [sym,setSym]=useState("GBPUSD");const [showPop,setShowPop]=useState(false);

  const [tp,setTp]=useState("");const [tpM,setTpM]=useState("price");
  const info=useMemo(()=>detectInstr(sym),[sym]);
  const calc=useMemo(()=>{
    const pn=s=>parseFloat(String(s).replace(",","."))||0;
    const b=pn(bal),r=pn(risk),lv=pn(lev)||1,en=pn(entry),sln=pn(sl),tpn=pn(tp);
    const rU=b*(r/100),pvl=info.pip*info.cs;
    const slp=slM==="pips"?sln:(en>0&&sln>0?Math.abs(en-sln)/info.pip:0);
    const dOk=slM!=="price"||!(en>0&&sln>0)||(dir==="long"?sln<en:sln>en);
    const lots=slp>0?rU/(slp*pvl):0;
    const posU=lots*info.cs*(en>0?en:1),marg=posU/lv;
    const tpp=tpM==="pips"?tpn:tpM==="rr"&&slp>0?slp*tpn:(en>0&&tpn>0?Math.abs(tpn-en)/info.pip:0);
    return{rU,lots,slp,tpp,profU:tpp*pvl*lots,rr:slp>0&&tpp>0?tpp/slp:0,marg,dOk,pvl,units:lots*info.cs};

  const pt=isDesktop?"40px 16px 8px":"max(24px,env(safe-area-inset-top)) 16px 8px";
  return(<div style={{padding:"0 0 100px"}}>
    <div style={{padding:pt}}><div style={{fontSize:26,fontWeight:700,color:C.text}}>{t.calcTitle}</div><div style={{fontSize:12,color:C.text3}}>{t.posSizeTitle}</div></div>

          <span style={{fontSize:11,color:C.text3}}>{t.typeL}: <b style={{color:C.tint}}>{info.label}</b></span>

      <Card>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}><Input label={t.balance} value={bal} onChange={setBal} type="number" prefix="$"/><Input label={t.riskPct} value={risk} onChange={setRisk} type="number" suffix="%"/></div>
        <Label>{t.quickBal}</Label><QB values={[5000,10000,25000,50000,100000]} selected={parseFloat(bal)} onSel={v=>setBal(String(v))} fmt={v=>`$${v>=1000?v/1000+"k":v}`}/>
        <div style={{marginTop:10}}><Label>{t.riskLevel}</Label><QB values={[0.5,1,1.5,2,3,5]} selected={parseFloat(risk)} onSel={v=>setRisk(String(v))} fmt={v=>`${v}%`}/></div>
        <div style={{marginTop:10,background:C.tintDim,borderRadius:10,padding:"10px 14px",display:"flex",justifyContent:"space-between",alignItems:"center",border:`1px solid ${C.tint}30`}}><span style={{fontSize:13,color:C.text3}}><Term word="Risk Amount">{t.riskAmt}</Term></span><span style={{fontSize:18,fontWeight:700,color:C.tint,fontFamily:"'JetBrains Mono',monospace"}}>${calc.rU.toFixed(2)}</span></div>
      </Card>
      <Card><Input label={<Term word="Leverage">{t.leverage}</Term>} value={lev} onChange={setLev} type="number" prefix="1:" style={{marginBottom:10}}/><QB values={[1,2,5,10,20,50,100,200,500]} selected={parseFloat(lev)} onSel={v=>setLev(String(v))} fmt={v=>`1:${v}`}/></Card>
      <Card>
        <Input label={t.entryPrice} value={entry} onChange={setEntry} type="number" placeholder="0.00000" style={{marginBottom:10}}/>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}><span style={{fontSize:11,fontWeight:700,color:C.loss}}>{t.stopLoss.toUpperCase()}</span><div style={{display:"flex",gap:4}}>{[{label:t.priceM,value:"price"},{label:t.pipsM,value:"pips"}].map(m=><button key={m.value} onClick={()=>setSlM(m.value)} style={{padding:"4px 10px",borderRadius:6,fontSize:11,fontWeight:600,background:slM===m.value?C.tint:C.bg3,color:slM===m.value?"#fff":C.text2}}>{m.label}</button>)}</div></div>
        <Input value={sl} onChange={setSl} type="number" placeholder={slM==="price"?"0.00000":t.pipsM} suffix={slM==="pips"?"pips":undefined}/>
        {calc.slp>0&&<div style={{marginTop:4,display:"flex",gap:12}}><span style={{fontSize:11,color:C.text3}}>= {calc.slp.toFixed(1)} {t.pipsLabel}</span>{!calc.dOk&&<span style={{fontSize:11,color:C.warning}}>{t.slWarn}</span>}</div>}
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:12,marginBottom:6}}><span style={{fontSize:11,fontWeight:700,color:C.profit}}>{t.takeProfit.toUpperCase()}</span><div style={{display:"flex",gap:4}}>{[{label:t.priceM,value:"price"},{label:t.pipsM,value:"pips"},{label:t.rrM,value:"rr"}].map(m=><button key={m.value} onClick={()=>setTpM(m.value)} style={{padding:"4px 10px",borderRadius:6,fontSize:11,fontWeight:600,background:tpM===m.value?C.tint:C.bg3,color:tpM===m.value?"#fff":C.text2}}>{m.label}</button>)}</div></div>
        <Input value={tp} onChange={setTp} type="number" placeholder={tpM==="price"?"0.00000":tpM==="pips"?t.pipsM:"2"} prefix={tpM==="rr"?"1:":undefined} suffix={tpM==="pips"?"pips":undefined}/>
        {calc.tpp>0&&<div style={{marginTop:4,fontSize:11,color:C.text3}}>= {calc.tpp.toFixed(1)} {t.pipsLabel}</div>}
      </Card>
      {calc.lots>0?<>
        <Card glow><div style={{fontSize:14,fontWeight:700,color:C.text,marginBottom:6}}>{t.resultTitle}</div>
          <RR label={<Term word="Lot">{t.lotSize}</Term>} value={fL(calc.lots)} color={dir==="long"?C.profit:C.loss} big/>
          <RR label={t.units} value={calc.units>0?Math.round(calc.units).toLocaleString("ru-RU"):"—"}/>
          <RR label={<Term word="Risk Amount">{t.riskUSD}</Term>} value={`$${calc.rU.toFixed(2)}`} color={C.loss}/>
          <RR label={<Term word="Pip">{t.slPips}</Term>} value={`${calc.slp.toFixed(1)}`}/>
          {calc.marg>0&&<RR label={<Term word="Margin">{t.margin}</Term>} value={`$${calc.marg.toFixed(2)}`}/>}
          {calc.profU>0&&<RR label={t.potProfit} value={`$${calc.profU.toFixed(2)}`} color={C.profit}/>}
          {calc.rr>0&&<RR label={<Term word="R:R">R:R</Term>} value={`1:${calc.rr.toFixed(2)}`} color={calc.rr>=2?C.profit:calc.rr>=1?C.warning:C.loss}/>}
        </Card>
        <button onClick={send} style={{width:"100%",padding:"14px",borderRadius:14,background:`linear-gradient(135deg,${C.tint},#00A876)`,color:"#fff",fontWeight:700,fontSize:15,display:"flex",alignItems:"center",justifyContent:"center",gap:8,boxShadow:`0 4px 20px ${C.tint}40`}}>{t.openInJournal}</button>
      </>:<div style={{textAlign:"center",padding:"28px 16px",border:`1px dashed ${C.border}`,borderRadius:16}}><div style={{fontSize:24,marginBottom:8}}>🎯</div><div style={{color:C.text3,fontSize:13}}>{t.calcHint}</div></div>}
    </div>
  </div>);
}

// ── Stats ─────────────────────────────────────────────────────────────────────
function Stats({isDesktop}){
  const {trades,stats}=useTrades();const {t}=useLang();
  const mR=useMemo(()=>{const m={};trades.filter(x=>x.status==="closed"&&x.resultR!=null).forEach(x=>{const d=new Date(x.date),k=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;m[k]=(m[k]??0)+x.resultR;});return Object.entries(m).sort().slice(-6);},[trades]);
  const bI=useMemo(()=>{const m={};trades.filter(x=>x.status==="closed"&&x.resultR!=null).forEach(x=>{const k=x.instrument;if(!m[k])m[k]={r:0,count:0,wins:0};m[k].r+=x.resultR;m[k].count++;if(x.resultR>0)m[k].wins++;});return Object.entries(m).sort((a,b)=>b[1].r-a[1].r).slice(0,8);},[trades]);
  const MR=({label,value,color})=><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 0",borderBottom:`1px solid ${C.border}`}}><span style={{fontSize:13,color:C.text2}}>{label}</span><span style={{fontSize:13,fontWeight:700,color:color||C.text,fontFamily:"'JetBrains Mono',monospace"}}>{value}</span></div>;
  const pt=isDesktop?"40px 16px 12px":"max(24px,env(safe-area-inset-top)) 16px 12px";
  return(<div style={{padding:"0 0 100px"}}>
    <div style={{padding:pt}}><div style={{fontSize:26,fontWeight:700,color:C.text}}>{t.statsTitle}</div></div>
    <div style={{padding:"0 16px",display:"flex",flexDirection:"column",gap:12}}>
      <Card><div style={{fontSize:12,fontWeight:700,color:C.text,marginBottom:6}}>{t.overallStats}</div>
        <MR label={t.totalTrades} value={stats.total}/>
        <MR label={<Term word="Win Rate">Win Rate</Term>} value={`${stats.winRate.toFixed(1)}%`} color={stats.winRate>=50?C.profit:C.loss}/>
        <MR label={<Term word="Profit Factor">Profit Factor</Term>} value={stats.pf===Infinity?"∞":stats.pf.toFixed(2)} color={stats.pf>=1.5?C.profit:C.loss}/>
        <MR label={<Term word="R">{t.totalR}</Term>} value={`${stats.totalR>=0?"+":""}${stats.totalR.toFixed(2)}R`} color={stats.totalR>=0?C.profit:C.loss}/>
        <MR label="Total USD" value={`${stats.totalUSD>=0?"+":""}$${Math.abs(stats.totalUSD).toFixed(2)}`} color={stats.totalUSD>=0?C.profit:C.loss}/>
        <MR label={<Term word="Avg Win">Avg Win</Term>} value={`+${stats.avgWin.toFixed(2)}R`} color={C.profit}/>
        <MR label={<Term word="Avg Loss">Avg Loss</Term>} value={`-${stats.avgLoss.toFixed(2)}R`} color={C.loss}/>
        <MR label={<Term word="Best Trade">Best Trade</Term>} value={`${stats.best>=0?"+":""}${stats.best.toFixed(2)}R`} color={C.profit}/>
        <MR label={<Term word="Worst Trade">Worst Trade</Term>} value={`${stats.worst.toFixed(2)}R`} color={C.loss}/>
      </Card>
      {mR.length>0&&<Card><div style={{fontSize:12,fontWeight:700,color:C.text,marginBottom:6}}>{t.byMonth}</div>{mR.map(([mo,r])=><div key={mo} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 0",borderBottom:`1px solid ${C.border}`}}><span style={{fontSize:12,color:C.text3,fontFamily:"'JetBrains Mono',monospace",minWidth:60}}>{mo}</span><div style={{flex:1,height:6,background:C.bg3,borderRadius:3,overflow:"hidden"}}><div style={{height:"100%",borderRadius:3,width:`${Math.min(100,Math.abs(r)/Math.max(...mR.map(([,v])=>Math.abs(v)))*100)}%`,background:r>=0?C.profit:C.loss}}/></div><span style={{fontSize:12,fontWeight:700,fontFamily:"'JetBrains Mono',monospace",color:r>=0?C.profit:C.loss,minWidth:55,textAlign:"right"}}>{r>=0?"+":""}{r.toFixed(2)}R</span></div>)}</Card>}
      {bI.length>0&&<Card><div style={{fontSize:12,fontWeight:700,color:C.text,marginBottom:6}}>{t.byInstr}</div>{bI.map(([s2,d])=><div key={s2} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 0",borderBottom:`1px solid ${C.border}`}}><span style={{fontSize:12,fontWeight:700,fontFamily:"'JetBrains Mono',monospace",color:C.text,minWidth:70}}>{s2}</span><span style={{fontSize:11,color:C.text3}}>{d.count} · WR {(d.wins/d.count*100).toFixed(0)}%</span><span style={{marginLeft:"auto",fontSize:13,fontWeight:700,fontFamily:"'JetBrains Mono',monospace",color:d.r>=0?C.profit:C.loss}}>{d.r>=0?"+":""}{d.r.toFixed(2)}R</span></div>)}</Card>}
      {stats.total===0&&<div style={{textAlign:"center",padding:40,color:C.text3}}>{t.noStatsHint}</div>}
    </div>
  </div>);
}

// ── New Trade / Edit Trade / New Plan ─────────────────────────────────────────
function NewTrade({onBack,onSaved,prefill={},isDesktop,mode="new",editTrade=null}){
  const {addTrade,updateTrade}=useTrades();const {t}=useLang();
  const isPlan=mode==="plan";
  const isEdit=mode==="edit"&&editTrade!=null;
  const src=isEdit?editTrade:{};
  const SESS=[t.sAsia,t.sLondon,t.sNY,t.sLonNY,t.sLonAsia];
  const [instr,setInstr]=useState(src.instrument||prefill.instrument||"");
  const [sess,setSess]=useState(src.sessions||[]);
  const [htf,setHtf]=useState(src.htfTimeframe||"");const [ltf,setLtf]=useState(src.ltfTimeframe||"");
  const [mktType,setMktType]=useState(src.marketType||"trend");const [vol,setVol]=useState(src.volatility||"medium");
  const [curStr,setCurStr]=useState(src.currentStructure||"");const [devWave,setDevWave]=useState(src.developingWave||"");
  const [strStart,setStrStart]=useState(src.structureStart||"");const [fibT,setFibT]=useState(src.fibTarget||"");
  const [scenL,setScenL]=useState(src.scenarioLogic||"");const [inv,setInv]=useState(src.invalidationLevel||"");
  const [altM,setAltM]=useState(src.altMarkup||"");const [altP,setAltP]=useState(src.altProbability!=null?String(src.altProbability):"");
  const [altC,setAltC]=useState(src.altConfirmation||"");const [altB,setAltB]=useState(src.altBiasChange||"");
  const [eType,setEType]=useState(src.entryType||"");
  const [ep,setEp]=useState(src.entryPoint!=null?String(src.entryPoint):prefill.entryPoint!=null?String(prefill.entryPoint):"");
  const [sl2,setSl2]=useState(src.stopLoss!=null?String(src.stopLoss):prefill.stopLoss!=null?String(prefill.stopLoss):"");
  const [tp2,setTp2]=useState(src.takeProfit!=null?String(src.takeProfit):prefill.takeProfit!=null?String(prefill.takeProfit):"");
  const [rp,setRp]=useState(src.riskPercent!=null?String(src.riskPercent):prefill.riskPercent!=null?String(prefill.riskPercent):"");
  const [ps,setPs]=useState(src.positionSize!=null?String(src.positionSize):prefill.positionSize!=null?String(prefill.positionSize):"");
  const [cc,setCc]=useState(src.cancelConditions||"");
  const [pE,setPE]=useState(src.psychEnergy||3);const [pF,setPF]=useState(src.psychFocus||3);
  const [pC,setPC]=useState(src.psychCalm||3);const [pP,setPP]=useState(src.psychPressure||2);
  const [pLS,setPLS]=useState(src.psychLossStreak||false);
  const [bF,setBF]=useState(src.biasFOMO||false);const [bC2,setBC2]=useState(src.biasConfirmation||false);
  const [bR,setBR]=useState(src.biasRevenge||false);const [bO,setBO]=useState(src.biasOverconfidence||false);
  const [rta,setRta]=useState(src.readyToAcceptStop!==undefined?src.readyToAcceptStop:true);
  const aRR=useMemo(()=>{const e=parseFloat(ep),s=parseFloat(sl2),tp=parseFloat(tp2);if(!e||!s||!tp||e===s)return null;return Math.abs(tp-e)/Math.abs(e-s);},[ep,sl2,tp2]);

  function buildData(){
    return{instrument:instr.toUpperCase(),sessions:sess,htfTimeframe:htf,ltfTimeframe:ltf,
      marketType:mktType,volatility:vol,currentStructure:curStr,developingWave:devWave,
      structureStart:strStart,fibTarget:fibT,scenarioLogic:scenL,invalidationLevel:inv,
      altMarkup:altM,altProbability:parseFloat(altP)||undefined,altConfirmation:altC,altBiasChange:altB,
      entryType:eType||undefined,entryPoint:parseFloat(ep)||undefined,stopLoss:parseFloat(sl2)||undefined,
      takeProfit:parseFloat(tp2)||undefined,plannedRR:prefill.plannedRR??aRR,
      riskPercent:parseFloat(rp)||undefined,positionSize:parseFloat(ps)||undefined,cancelConditions:cc,
      psychEnergy:pE,psychFocus:pF,psychCalm:pC,psychPressure:pP,psychLossStreak:pLS,
      biasFOMO:bF,biasConfirmation:bC2,biasRevenge:bR,biasOverconfidence:bO,readyToAcceptStop:rta};
  }

  async function save(){
    if(!instr.trim()){alert(t.instrReq);return;}
    if(isEdit){
      await updateTrade(editTrade.id,buildData());
    } else {
      await addTrade({...buildData(),status:isPlan?"plan":"open"});
    }
    onSaved();
  }

  const headerPt=isDesktop?"max(40px,env(safe-area-inset-top))":"max(16px,env(safe-area-inset-top))";
  const headerTitle=isEdit?t.editMode:isPlan?t.planTitle:t.newTrade;
  const headerBg=isPlan?"#818CF820":isEdit?C.tintDim:undefined;

  return(<div style={{height:"100%",display:"flex",flexDirection:"column"}}>
    <div style={{padding:`${headerPt} 16px 16px`,display:"flex",alignItems:"center",justifyContent:"space-between",borderBottom:`1px solid ${C.border}`,background:C.bg,position:"sticky",top:0,zIndex:10}}>
      <button onClick={onBack} style={{color:C.text2,fontSize:24,lineHeight:1}}>←</button>
      <span style={{fontSize:15,fontWeight:700,color:isPlan?"#818CF8":C.text}}>{headerTitle}</span>
      <button onClick={save} style={{padding:"7px 18px",borderRadius:20,background:isPlan?"#818CF8":C.tint,color:"#fff",fontSize:13,fontWeight:600}}>{isEdit?t.saveEdit:t.save}</button>
    </div>
    <div style={{flex:1,overflowY:"auto",padding:"12px 16px 100px",display:"flex",flexDirection:"column",gap:12}}>
      {isPlan&&<div style={{padding:"10px 14px",borderRadius:12,background:"#818CF815",border:"1px solid #818CF830"}}><div style={{fontSize:12,fontWeight:700,color:"#818CF8",marginBottom:3}}>📋 {t.planTitle}</div><div style={{fontSize:11,color:C.text2,lineHeight:1.5}}>{t.planDesc}</div></div>}
      {!isPlan&&!isEdit&&prefill.instrument&&<div style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",borderRadius:12,background:C.tintDim,border:`1px solid ${C.tint}40`}}><span>⚡</span><div><div style={{fontSize:12,fontWeight:700,color:C.tint}}>{t.prefillBanner}</div><div style={{fontSize:11,color:C.text2}}>{prefill.instrument} · {prefill.direction==="long"?t.longBtn:t.shortBtn}{prefill.positionSize?` · ${prefill.positionSize} lot`:""}{prefill.plannedRR?` · R:R 1:${prefill.plannedRR.toFixed(2)}`:""}</div></div></div>}
      <Card><SectionHeader n="1" title={t.sec1}/>
        <Input label={t.instrLabel} value={instr} onChange={v=>setInstr(v.toUpperCase())} placeholder={t.instrPh}/>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}><Input label={<Term word="HTF">{t.htf}</Term>} value={htf} onChange={setHtf} placeholder="H4"/><Input label={<Term word="LTF">{t.ltf}</Term>} value={ltf} onChange={setLtf} placeholder="M15"/></div>
        <Label>{t.sessions}</Label><div style={{display:"flex",flexWrap:"wrap",gap:8}}>{SESS.map(s=>{const a=sess.includes(s);return<button key={s} onClick={()=>setSess(p=>a?p.filter(x=>x!==s):[...p,s])} style={{padding:"6px 14px",borderRadius:20,fontSize:12,fontWeight:600,background:a?C.tint:C.bg3,color:a?"#fff":C.text2,border:`1px solid ${a?C.tint:C.border}`}}>{s}</button>;})}</div>
        <Label>{t.mktType}</Label><Seg options={[{label:t.trend,value:"trend"},{label:t.correction,value:"correction"},{label:t.range,value:"range"}]} value={mktType} onChange={setMktType}/>
        <Label>{t.vol}</Label><Seg options={[{label:t.low,value:"low"},{label:t.medium,value:"medium"},{label:t.high,value:"high"}]} value={vol} onChange={setVol}/>
      </Card>
      <Card><SectionHeader n="2" title={t.sec2}/>
        <Input label={t.structure} value={curStr} onChange={setCurStr} placeholder={t.structPh}/>
        <Input label={t.devWave} value={devWave} onChange={setDevWave} placeholder={t.devWavePh}/>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}><Input label={t.structStart} value={strStart} onChange={setStrStart}/><Input label={<Term word="Fib">{t.fibTarget}</Term>} value={fibT} onChange={setFibT} placeholder={t.fibPh}/></div>
        <Input label={t.scenLogic} value={scenL} onChange={setScenL} placeholder={t.scenPh} multiline/>
        <Input label={t.invalidation} value={inv} onChange={setInv}/>
      </Card>
      <Card><SectionHeader n="3" title={t.sec3}/>
        <Input label={t.altMarkup} value={altM} onChange={setAltM} placeholder={t.altPh} multiline/>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}><Input label={t.altProb} value={altP} onChange={setAltP} type="number" placeholder="30"/><Input label={t.altBias} value={altB} onChange={setAltB}/></div>
        <Input label={t.altConfirm} value={altC} onChange={setAltC}/>
      </Card>
      <Card><SectionHeader n="4" title={t.sec4}/>
        <Label>{t.entryType}</Label>
        <div style={{marginBottom:6}}>
          <div style={{fontSize:10,color:C.text3,marginBottom:4}}>{t.impulse}</div>
          <div style={{display:"flex",gap:8}}>{["1","2","3","4","5"].map(w=><button key={w} onClick={()=>setEType(w)} style={{flex:1,padding:"10px 0",borderRadius:10,fontWeight:700,fontSize:15,background:eType===w?C.tint:C.bg3,color:eType===w?"#fff":C.text2,border:`1px solid ${eType===w?C.tint:C.border}`}}>{w}</button>)}</div>
          <div style={{fontSize:10,color:C.text3,margin:"8px 0 4px"}}>{t.corrLabel}</div>
          <div style={{display:"flex",gap:8}}>{["A","B","C"].map(w=><button key={w} onClick={()=>setEType(w)} style={{flex:1,padding:"10px 0",borderRadius:10,fontWeight:700,fontSize:15,background:eType===w?"#818CF8":C.bg3,color:eType===w?"#fff":C.text2,border:`1px solid ${eType===w?"#818CF8":C.border}`}}>{w}</button>)}</div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}><Input label={t.entryPoint} value={ep} onChange={setEp} type="number" placeholder="0.00"/><Input label={t.stopLoss} value={sl2} onChange={setSl2} type="number" placeholder="0.00"/></div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          <Input label={t.takeProfit} value={tp2} onChange={setTp2} type="number" placeholder="0.00"/>
          <div><Label><Term word="R:R">{t.plannedRR}</Term></Label><div style={{background:aRR?(aRR>=2?C.profit+"20":aRR>=1?C.warning+"20":C.loss+"20"):C.bg3,borderRadius:10,padding:"10px 12px",textAlign:"center",fontWeight:700,fontSize:17,fontFamily:"'JetBrains Mono',monospace",color:aRR?(aRR>=2?C.profit:aRR>=1?C.warning:C.loss):C.text3}}>{aRR?`1:${aRR.toFixed(2)}`:"—"}</div></div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}><Input label={t.riskPctL} value={rp} onChange={setRp} type="number" placeholder="1"/><Input label={t.posSizeL} value={ps} onChange={setPs} type="number"/></div>
        <Input label={t.cancelCond} value={cc} onChange={setCc} placeholder={t.cancelPh} multiline/>
      </Card>
      {!isPlan&&<Card><SectionHeader n="5" title={t.sec5}/>
        <ScoreRow label={t.energy} value={pE} onChange={setPE}/><ScoreRow label={t.focus} value={pF} onChange={setPF}/>
        <ScoreRow label={t.calm} value={pC} onChange={setPC}/><ScoreRow label={t.pressure} value={pP} onChange={setPP}/>
        <Label style={{marginTop:8}}>{t.lossStreak}</Label>
        <Seg options={[{label:t.no,value:"no"},{label:t.yes,value:"yes"}]} value={pLS?"yes":"no"} onChange={v=>setPLS(v==="yes")}/>
        <Label style={{marginTop:8}}>{t.biases}</Label>
        <div style={{display:"flex",flexDirection:"column",gap:6}}>
          <Toggle label={<Term word="FOMO">{t.fomo}</Term>} value={bF} onChange={setBF}/>
          <Toggle label={<Term word="Confirmation">{t.biasConf}</Term>} value={bC2} onChange={setBC2}/>
          <Toggle label={<Term word="Revenge">{t.biasRev}</Term>} value={bR} onChange={setBR}/>
          <Toggle label={<Term word="Overconfidence">{t.biasOver}</Term>} value={bO} onChange={setBO}/>
        </div>
        <div style={{marginTop:8,padding:14,borderRadius:14,background:rta?C.profit+"12":C.loss+"12",border:`1px solid ${rta?C.profit+"40":C.loss+"40"}`}}>
          <div style={{fontSize:13,color:C.text,marginBottom:10}}>{t.readyQ}</div>
          <div style={{display:"flex",gap:10}}>
            <button onClick={()=>setRta(true)} style={{flex:1,padding:10,borderRadius:10,fontWeight:700,fontSize:14,background:rta?C.profit:C.bg3,color:rta?"#fff":C.text2}}>{t.yes}</button>
            <button onClick={()=>setRta(false)} style={{flex:1,padding:10,borderRadius:10,fontWeight:700,fontSize:14,background:!rta?C.loss:C.bg3,color:!rta?"#fff":C.text2}}>{t.no}</button>
          </div>
        </div>
      </Card>}

      {(trade.currentStructure||trade.scenarioLogic||trade.developingWave)&&<Card>

      </Card>}

      {/* Conclusion */}
      {trade.mainConclusion&&<Card><div style={{fontSize:12,fontWeight:700,color:C.text,marginBottom:6}}>{t.conclusionT}</div><div style={{fontSize:13,color:C.text,lineHeight:1.6}}>{trade.mainConclusion}</div></Card>}

      {/* Plan → confirm button */}
      {isPlan&&<button onClick={confirmPlan} style={{padding:"14px",borderRadius:14,background:"linear-gradient(135deg,#818CF8,#6366F1)",color:"#fff",fontWeight:700,fontSize:15,boxShadow:"0 4px 20px #818CF840"}}>{t.confirmTrade}</button>}

          <Input label={t.resUSD} value={rU} onChange={setRU} type="number" placeholder="250"/>

        <Label>{t.errType}</Label><Seg options={[{label:t.errNone,value:"none"},{label:t.errAn,value:"analysis"},{label:t.errEx,value:"execution"}]} value={eT} onChange={setET}/>

      {/* Closed → reopen */}
      {trade.status==="closed"&&<button onClick={()=>updateTrade(trade.id,{status:"open",resultR:undefined,resultUSD:undefined})} style={{padding:12,borderRadius:12,background:C.bg3,color:C.text2,border:`1px solid ${C.border}`,fontSize:13}}>{t.reopen}</button>}
    </div>
  </div>);
}

// ── Supabase Config Form ──────────────────────────────────────────────────────
function SBConfigForm({onSaved}){
  const {t}=useLang();const {saveSBConfig}=useAuth();
  const [url,setUrl]=useState(localStorage.getItem(SB_URL_KEY)||"");
  const [key,setKey]=useState(localStorage.getItem(SB_KEY_KEY)||"");
  const [err,setErr]=useState("");const [loading,setLoading]=useState(false);
  async function handleSave(){
    if(!url.trim()||!key.trim()){setErr("Введите URL и Key");return;}
    setLoading(true);setErr("");
    try{
      // Test connection
      const res=await fetch(`${url.trim()}/rest/v1/`,{headers:{"apikey":key.trim(),"Authorization":`Bearer ${key.trim()}`}});
      if(!res.ok)throw new Error("Connection failed");
      saveSBConfig(url,key);
      onSaved&&onSaved();
    }catch(e){setErr(t.supabaseError);}
    finally{setLoading(false);}
  }
  return(<div>
    <Input label={t.supabaseUrl} value={url} onChange={setUrl} placeholder="https://xxxx.supabase.co" style={{marginBottom:8}}/>
    <Input label={t.supabaseKey} value={key} onChange={setKey} placeholder="eyJhbGci..." style={{marginBottom:12}}/>
    {err&&<div style={{fontSize:11,color:C.loss,marginBottom:8}}>{err}</div>}
    <button onClick={handleSave} disabled={loading} style={{width:"100%",padding:"12px",borderRadius:10,fontWeight:700,fontSize:13,background:C.tint,color:"#fff",border:"none",opacity:loading?0.6:1}}>
      {loading?t.authLoading:t.supabaseSave}
    </button>
  </div>);
}

// ── Supabase Auth Form ────────────────────────────────────────────────────────
function SBAuthForm(){
  const {t}=useLang();const {login,register}=useAuth();
  const [mode,setMode]=useState("login");
  const [email,setEmail]=useState("");const [password,setPassword]=useState("");
  const [err,setErr]=useState("");const [loading,setLoading]=useState(false);
  async function handle(){
    if(!email||!password){setErr(t.authError);return;}
    setLoading(true);setErr("");
    try{
      if(mode==="login")await login(email,password);
      else await register(email,password);
    }catch(e){setErr(e.message||t.authError);}
    finally{setLoading(false);}
  }
  return(<div>
    <Input label={t.authEmail} value={email} onChange={setEmail} type="email" placeholder="you@example.com" style={{marginBottom:8}}/>
    <Input label={t.authPassword} value={password} onChange={setPassword} type="password" placeholder="••••••" style={{marginBottom:4}}/>
    {mode==="register"&&<div style={{fontSize:11,color:C.text3,marginBottom:8}}>{t.authPasswordHint}</div>}
    {err&&<div style={{fontSize:11,color:C.loss,marginBottom:8}}>{err}</div>}
    <button onClick={handle} disabled={loading} style={{width:"100%",padding:"12px",borderRadius:10,fontWeight:700,fontSize:13,background:C.tint,color:"#fff",border:"none",marginBottom:8,opacity:loading?0.6:1}}>
      {loading?t.authLoading:mode==="login"?t.authLogin:t.authRegister}
    </button>
    <button onClick={()=>{setMode(m=>m==="login"?"register":"login");setErr("");}} style={{width:"100%",padding:"8px",borderRadius:10,fontSize:12,color:C.text3,background:"none"}}>
      {mode==="login"?t.authToggleRegister:t.authToggleLogin}
    </button>
  </div>);
}

  const {user,sbReady,sbConfigured,logout,removeSBConfig,saveSBConfig,setSbReady,setSbConfigured}=useAuth();
  const [fmt,setFmt]=useState("json");const [importText,setImportText]=useState("");const [iMode,setIMode]=useState("merge");
  const [toast,setToast]=useState(null);const fileRef=useRef();
  const isIOS=/iPad|iPhone|iPod/.test(navigator.userAgent);
  const showToast=(msg,ok=true)=>{setToast({msg,ok});setTimeout(()=>setToast(null),3000);};

  function getPayload(){
    if(fmt==="json")return{text:JSON.stringify({version:2,exportedAt:new Date().toISOString(),trades},null,2),ext:"json"};
    const cols=["id","date","instrument","status","resultR","resultUSD","tradeClass","entryType","marketType","volatility","developingWave","entryPoint","stopLoss","takeProfit","plannedRR","riskPercent","positionSize","psychEnergy","psychFocus","psychCalm","psychPressure","mainConclusion","errorType","wouldRepeat"];
    const esc=v=>v==null?"":String(v).includes(",")?`"${String(v).replace(/"/g,'""')}"`:String(v);
    return{text:[cols.join(","),...trades.map(tr=>cols.map(c=>esc(tr[c])).join(","))].join("\n"),ext:"csv"};
  }
  function handleCopy(){const{text}=getPayload();navigator.clipboard.writeText(text).then(()=>showToast(t.copiedToast)).catch(()=>showToast(t.copyErr,false));}
  function handleDownload(){
    const{text,ext}=getPayload();const mime=ext==="json"?"application/json":"text/csv";
    const filename=`trader-journal-${new Date().toISOString().slice(0,10)}.${ext}`;
    const blob=new Blob([text],{type:mime});const url=URL.createObjectURL(blob);
    const a=document.createElement("a");a.href=url;a.download=filename;
    document.body.appendChild(a);a.click();setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(url);},300);
    showToast(ext==="json"?t.exportedToast(trades.length):t.csvToast(trades.length));

            <div style={{padding:"10px 14px",borderRadius:10,background:C.tintDim,border:`1px solid ${C.tint}30`,marginBottom:12}}>
              <div style={{fontSize:12,fontWeight:700,color:C.tint,marginBottom:2}}>✓ {t.supabaseConnected}</div>
              <div style={{fontSize:11,color:C.text2}}>{user.email}</div>
            </div>
          ):(
            <div style={{padding:"10px 14px",borderRadius:10,background:C.bg3,border:`1px solid ${C.border}`,marginBottom:12}}>
              <div style={{fontSize:12,color:C.text3,lineHeight:1.5}}>{t.supabaseInfo}</div>
            </div>
          )}

          {/* Config form — only show if no config yet */}
          {!sbConfigured&&<SBConfigForm onSaved={()=>{setSbConfigured(true);}}/>}

          {/* Login form — config set but not logged in */}
          {sbConfigured&&!user&&<SBAuthForm/>}

          {/* Logged in actions */}
          {user&&<>
            <button onClick={async()=>{
              const n=await syncToCloud().catch(()=>null);
              if(n!=null)showToast(t.supabaseSynced(n));
              else showToast(t.supabaseError,false);
            }} style={{width:"100%",padding:"12px",borderRadius:10,fontWeight:700,fontSize:13,background:C.tint,color:"#fff",border:"none",marginBottom:8}}>
              {syncing?t.supabaseSyncing:t.supabaseSync}
            </button>
            <button onClick={async()=>{await logout();showToast("Выход выполнен");}} style={{width:"100%",padding:"10px",borderRadius:10,fontWeight:600,fontSize:13,background:C.bg3,color:C.text2,border:`1px solid ${C.border}`}}>
              {t.authLogout}
            </button>
          </>}

          {/* Disconnect config */}
          {sbConfigured&&<button onClick={()=>{if(confirm("Отключить Supabase? Локальные данные останутся.")){removeSBConfig();}}} style={{width:"100%",marginTop:8,padding:"10px",borderRadius:10,fontWeight:600,fontSize:12,background:"none",color:C.text3,border:`1px dashed ${C.border}`}}>
            {t.supabaseDisconnect}
          </button>}
        </div>
      </SettingsRow>

      {/* DB info */}
      <SettingsRow icon="🗄" title={t.dbInfo} sub={t.dbInfoSub}>
        <div style={{padding:"8px 12px",background:C.bg3,borderRadius:10,marginTop:4}}>
          <div style={{fontSize:12,color:C.text2,lineHeight:1.6}}>{t.dbInfoSub}</div>
          <div style={{marginTop:8,display:"flex",gap:16}}>
            <div><div style={{fontSize:10,color:C.text3}}>Trades</div><div style={{fontSize:18,fontWeight:700,color:C.tint,fontFamily:"'JetBrains Mono',monospace"}}>{trades.length}</div></div>
            <div><div style={{fontSize:10,color:C.text3}}>Storage</div><div style={{fontSize:14,fontWeight:700,color:C.text,fontFamily:"'JetBrains Mono',monospace"}}>{user?"Supabase + IDB":"IndexedDB"}</div></div>
          </div>
        </div>
      </SettingsRow>

      {/* Export */}
      <SettingsRow icon="📤" title={t.rowExport} sub={t.rowExportSub}>
        <div style={{paddingTop:4}}>
          <Label>{t.formatLabel}</Label>
          <div style={{display:"flex",gap:8,marginBottom:12}}>
            {[{v:"json",icon:"📦",label:"JSON",sub:t.jsonSub},{v:"csv",icon:"📊",label:"CSV",sub:t.csvSub}].map(f=>{
              const a=fmt===f.v;
              return<button key={f.v} onClick={()=>setFmt(f.v)} style={{flex:1,padding:"10px 8px",borderRadius:10,textAlign:"center",background:a?C.tint:C.bg3,border:`1.5px solid ${a?C.tint:C.border}`}}>
                <div style={{fontSize:18,marginBottom:3}}>{f.icon}</div>
                <div style={{fontSize:12,fontWeight:700,color:a?"#fff":C.text}}>{f.label}</div>
                <div style={{fontSize:10,color:a?"rgba(255,255,255,0.7)":C.text3,marginTop:1}}>{f.sub}</div>
              </button>;
            })}
          </div>
          <button onClick={handleCopy} style={{width:"100%",padding:"13px",borderRadius:12,fontWeight:700,fontSize:14,background:C.tint,color:"#fff",border:"none",boxShadow:`0 4px 16px ${C.tint}30`,marginBottom:isIOS?0:8}}>
            {t.copyBtn} {fmt.toUpperCase()}
          </button>
          {!isIOS&&<button onClick={handleDownload} style={{width:"100%",marginTop:8,padding:"12px",borderRadius:12,fontWeight:600,fontSize:13,background:C.bg3,color:C.text,border:`1px solid ${C.border}`}}>
            {t.dlBtn} {fmt.toUpperCase()}
          </button>}
          {isIOS&&<div style={{marginTop:10,padding:"10px 12px",borderRadius:8,background:C.bg3,border:`1px solid ${C.border}`}}>
            <div style={{fontSize:11,fontWeight:700,color:C.text,marginBottom:6}}>{t.iosTitle}</div>
            {[t.iosS1,t.iosS2,t.iosS3,t.iosS4].map((s,i)=><div key={i} style={{display:"flex",gap:8,marginBottom:4,alignItems:"flex-start"}}><div style={{width:18,height:18,borderRadius:9,background:C.tintDim,flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:700,color:C.tint}}>{i+1}</div><span style={{fontSize:11,color:C.text2,lineHeight:1.5}}>{s}</span></div>)}
          </div>}
        </div>
      </SettingsRow>

      {/* Import */}
      <SettingsRow icon="📥" title={t.rowImport} sub={t.rowImportSub}>
        <div style={{paddingTop:4}}>
          <Label>{t.importMode}</Label>
          <Seg options={[{label:t.merge,value:"merge"},{label:t.replace,value:"replace"}]} value={iMode} onChange={setIMode}/>
          <div style={{fontSize:11,color:C.text3,marginTop:6,marginBottom:10}}>{iMode==="merge"?t.mergeHint:t.replaceHint}</div>
          <input ref={fileRef} type="file" accept=".json" onChange={handleFile} style={{display:"none"}}/>
          <button onClick={()=>fileRef.current.click()} style={{width:"100%",padding:"12px",borderRadius:10,fontWeight:600,fontSize:13,background:C.bg3,color:C.text,border:`1px dashed ${C.border}`,marginBottom:10}}>{t.chooseFile}</button>
          <Label>{t.pasteLabel}</Label>
          <textarea value={importText} onChange={e=>setImportText(e.target.value)} placeholder={'{\n  "trades": [...]\n}'} rows={4} style={{width:"100%",background:C.bg3,border:`1px solid ${importText?C.tint+"60":C.border}`,borderRadius:10,color:C.text,fontSize:12,padding:"10px 12px",fontFamily:"'JetBrains Mono',monospace",resize:"vertical",lineHeight:1.5}}/>
          {importText&&<div style={{fontSize:11,color:C.tint,marginTop:4,marginBottom:8}}>{t.importReady}</div>}
          <button onClick={handleImport} disabled={!importText.trim()} style={{width:"100%",marginTop:8,padding:"12px",borderRadius:10,fontWeight:700,fontSize:13,background:importText.trim()?C.tint:C.bg3,color:importText.trim()?"#fff":C.text3,border:"none",opacity:importText.trim()?1:0.5}}>
            {iMode==="replace"?t.replaceBtn:t.importBtn}
          </button>
        </div>
      </SettingsRow>
    </div>

    {/* ── DANGER ── */}
    <GroupHeader title={t.sectionDanger}/>
    <div style={{background:C.bg2,border:`1px solid ${C.loss}25`,borderRadius:16,margin:"0 16px",overflow:"hidden"}}>
      <SettingsRow icon="🗑" title={t.rowClear} sub={t.rowClearSub} danger>
        <div style={{paddingTop:4}}>
          <div style={{fontSize:13,color:C.text2,marginBottom:12,lineHeight:1.5}}>{t.clearDesc}</div>
          <button onClick={async()=>{if(confirm(t.clearConfirm(trades.length))){await clearAll();window.location.reload();}}} style={{width:"100%",padding:"12px",borderRadius:10,fontWeight:700,fontSize:14,background:C.lossDim,color:C.loss,border:`1px solid ${C.loss}40`}}>{t.clearAll}</button>
        </div>
      </SettingsRow>
    </div>
  </div>);
}

// ── Cloud Status Badge ────────────────────────────────────────────────────────
function CloudBadge(){
  const {user}=useAuth();
  if(!user)return <div style={{marginTop:6,fontSize:10,color:C.text3,fontFamily:"'JetBrains Mono',monospace"}}>📱 Local</div>;
  return <div style={{marginTop:6,fontSize:10,color:C.tint,fontFamily:"'JetBrains Mono',monospace"}}>☁️ Cloud</div>;
}

// ── Desktop Sidebar ───────────────────────────────────────────────────────────
function SideNav({active,onNav}){
  const {t}=useLang();
  const NAV=[{id:"dashboard",label:t.home,icon:"⊡"},{id:"journal",label:t.journal,icon:"≡"},{id:"calc",label:t.calc,icon:"◇"},{id:"stats",label:t.stats,icon:"▦"},{id:"settings",label:t.settings,icon:"⚙"}];
  return(
    <div style={{width:220,background:C.bg2,borderRight:`1px solid ${C.border}`,display:"flex",flexDirection:"column",padding:"0 12px 20px",flexShrink:0}}>
      {/* Logo centered */}
      <div style={{padding:"32px 10px 28px",textAlign:"center"}}>
        <div style={{fontSize:22,fontWeight:700,color:C.tint,fontFamily:"'JetBrains Mono',monospace",letterSpacing:2,lineHeight:1.1}}>TRADER</div>
        <div style={{fontSize:12,color:C.text3,fontFamily:"'JetBrains Mono',monospace",letterSpacing:3,marginTop:2}}>JOURNAL</div>
      </div>
      {/* Nav */}
      <div style={{display:"flex",flexDirection:"column",gap:4,flex:1}}>
        {NAV.map(item=>{
          const a=active===item.id;
          return<button key={item.id} onClick={()=>onNav(item.id)} style={{display:"flex",alignItems:"center",gap:12,padding:"11px 14px",borderRadius:12,width:"100%",textAlign:"left",background:a?C.tintDim:"transparent",border:`1px solid ${a?C.tint+"40":"transparent"}`}}
            onMouseEnter={e=>{if(!a)e.currentTarget.style.background=C.bg3;}}
            onMouseLeave={e=>{if(!a)e.currentTarget.style.background="transparent";}}>
            <span style={{fontSize:18,color:a?C.tint:C.text3,width:22,textAlign:"center"}}>{item.icon}</span>
            <span style={{fontSize:13,fontWeight:a?700:500,color:a?C.tint:C.text2}}>{item.label}</span>
          </button>;
        })}
      </div>
      {/* Branding */}
      <div style={{padding:"14px 10px 0",textAlign:"center",borderTop:`1px solid ${C.border}`}}>
        <a href="https://www.instagram.com/your_trading_sensei_?igsh=MXc3NmcyYTRucndubw%3D%3D&utm_source=qr" target="_blank" rel="noopener noreferrer" style={{textDecoration:"none"}}>
          <div style={{fontSize:10,color:C.text3,fontFamily:"'JetBrains Mono',monospace",marginBottom:2}}>by</div>
          <div style={{fontSize:11,fontWeight:700,color:C.tint,fontFamily:"'JetBrains Mono',monospace",letterSpacing:0.5,marginBottom:4,cursor:"pointer"}}
            onMouseEnter={e=>e.currentTarget.style.opacity="0.7"}
            onMouseLeave={e=>e.currentTarget.style.opacity="1"}>
            YourTradingSensei
          </div>
        </a>
        <div style={{fontSize:10,color:C.text3,fontFamily:"'JetBrains Mono',monospace"}}>v3.0</div>
        <div style={{fontSize:10,color:C.text3,fontFamily:"'JetBrains Mono',monospace"}}>2026 All Rights Reserved</div>
        <CloudBadge/>
      </div>
    </div>
  );
}

// ── Bottom Nav ────────────────────────────────────────────────────────────────
function BottomNav({active,onNav}){
  const {t}=useLang();
  const NAV=[{id:"dashboard",label:t.home,icon:"⊡"},{id:"journal",label:t.journal,icon:"≡"},{id:"calc",label:t.calc,icon:"◇"},{id:"stats",label:t.stats,icon:"▦"},{id:"settings",label:t.settings,icon:"⚙"}];
  return(<div style={{position:"fixed",bottom:0,left:0,right:0,background:C.bg+"F0",borderTop:`1px solid ${C.border}`,display:"flex",padding:"8px 0",paddingBottom:"max(20px,env(safe-area-inset-bottom))",backdropFilter:"blur(16px)",zIndex:100}}>
    {NAV.map(item=>{const a=active===item.id;return<button key={item.id} onClick={()=>onNav(item.id)} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3,padding:"6px 0"}}><span style={{fontSize:20,color:a?C.tint:C.text3}}>{item.icon}</span><span style={{fontSize:10,color:a?C.tint:C.text3,fontWeight:a?700:400}}>{item.label}</span></button>;})}
  </div>);
}

// ── App ───────────────────────────────────────────────────────────────────────
function AppInner(){
  const [screen,setScreen]=useState("dashboard");const [activeTab,setActiveTab]=useState("dashboard");
  const [selId,setSelId]=useState(null);const [prefill,setPrefill]=useState(null);
  const [editTrade,setEditTrade]=useState(null);
  const {scale}=useScale();const {layout}=useLayout();
  const isDesktop=layout==="desktop";

  const nav=id=>{
    if(id==="new"){setPrefill(null);setScreen("new");}
    else if(id==="plan"){setScreen("plan");}
    else{setScreen(id);setActiveTab(id);}
  };
  const openTrade=id=>{setSelId(id);setScreen("trade");};
  const openInJournal=data=>{setPrefill(data);setScreen("new");};
  const handleEdit=trade=>{setEditTrade(trade);setScreen("edit");};
  const showNav=!["new","plan","edit","trade"].includes(screen);

  const content=(
    <>
      {screen==="dashboard"&&<Dashboard onNav={nav} onOpenTrade={openTrade} isDesktop={isDesktop}/>}
      {screen==="journal"&&<Journal onNav={nav} onOpenTrade={openTrade} isDesktop={isDesktop}/>}
      {screen==="calc"&&<Calculator onOpenInJournal={openInJournal} isDesktop={isDesktop}/>}
      {screen==="stats"&&<Stats isDesktop={isDesktop}/>}
      {screen==="settings"&&<Settings isDesktop={isDesktop}/>}
      {screen==="new"&&<NewTrade mode="new" prefill={prefill||{}} onBack={()=>{setPrefill(null);setScreen(activeTab);}} onSaved={()=>{setPrefill(null);setScreen("journal");}} isDesktop={isDesktop}/>}
      {screen==="plan"&&<NewTrade mode="plan" prefill={{}} onBack={()=>setScreen(activeTab)} onSaved={()=>setScreen("journal")} isDesktop={isDesktop}/>}
      {screen==="edit"&&editTrade&&<NewTrade mode="edit" editTrade={editTrade} prefill={{}} onBack={()=>{setEditTrade(null);setScreen("trade");}} onSaved={()=>{setEditTrade(null);setScreen("trade");}} isDesktop={isDesktop}/>}
      {screen==="trade"&&<TradeDetail tradeId={selId} onBack={()=>setScreen(activeTab)} onEdit={handleEdit} isDesktop={isDesktop}/>}
    </>
  );

  if(isDesktop){
    return(
      <div style={{height:"100vh",width:"100vw",background:C.bg,display:"flex",overflow:"hidden"}}>
        <SideNav active={activeTab} onNav={nav}/>
        <div style={{flex:1,display:"flex",justifyContent:"center",overflow:"auto",background:"#0D0D0D"}}>
          <div style={{
            width:540,flexShrink:0,
            transform:`scale(${scale})`,transformOrigin:"top center",
            marginTop:scale<1?`${(scale-1)*40}vh`:0,
          }}>
            {(screen==="new"||screen==="trade")
              ?<div style={{minHeight:"100vh",display:"flex",flexDirection:"column",background:C.bg,borderRadius:16,overflow:"hidden",boxShadow:"0 0 40px #00000060"}}>{content}</div>
              :<div style={{minHeight:"100vh",background:C.bg,borderRadius:16,paddingBottom:32,boxShadow:"0 0 40px #00000060"}}>{content}</div>
            }
          </div>
        </div>
      </div>
    );
  }

  // Mobile
  return(
    <div style={{height:"100vh",width:"100vw",background:C.bg,display:"flex",flexDirection:"column",overflow:"hidden"}}>
      <div style={{flex:1,overflowY:(screen==="new"||screen==="trade")?"hidden":"auto"}}>{content}</div>
      {showNav&&<BottomNav active={activeTab} onNav={nav}/>}
    </div>
  );
}

function App(){
  return(<ScaleProvider><LayoutProvider><AuthProvider><LangProvider><TradesProvider>
    <AppInner/>
  </TradesProvider></LangProvider></AuthProvider></LayoutProvider></ScaleProvider>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
